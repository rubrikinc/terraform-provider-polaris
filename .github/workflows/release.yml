# Publish release assets when a tag matching "v*" is pushed.
# GPG signing uses crazy-max/ghaction-import-gpg with the GPG_PRIVATE_KEY
# and PASSPHRASE secrets. GoReleaser passes --batch to gpg for
# non-interactive signing.
name: release
on:
  push:
    tags:
      - "v*"
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Unshallow
        run: git fetch --prune --unshallow
      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          cache: false
          go-version-file: "go.mod"
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: v2.14.3
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
