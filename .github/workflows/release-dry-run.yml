# Dry-run the GoReleaser pipeline without publishing or signing.
# Triggered manually via workflow_dispatch to validate the release
# process before tagging a real release.

name: release-dry-run
on:
  workflow_dispatch:
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Unshallow
        run: git fetch --prune --unshallow
      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          cache: false
          go-version-file: "go.mod"
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0
      - name: Run GoReleaser (dry run)
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: v2.14.3
          args: release --clean --snapshot --skip=sign,publish
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: dist/
          retention-days: 1
